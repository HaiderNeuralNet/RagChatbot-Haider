 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haider AI</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #060610;
            --surface: #0d0d20;
            --surface2: #12122a;
            --surface3: #16163a;
            --neon: #00d4ff;
            --neon2: #0088ff;
            --neon-dim: rgba(0, 212, 255, 0.08);
            --neon-glow: rgba(0, 212, 255, 0.3);
            --neon-border: rgba(0, 212, 255, 0.2);
            --text: #e8eaf6;
            --text-muted: #6b7280;
            --text-dim: #2d3148;
            --error: #ff4d6d;
            --radius: 16px;
            --radius-sm: 10px;
            --font: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        body {
            background: var(--bg);
            font-family: var(--font);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 20% 50%, rgba(0, 136, 255, 0.04) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 20%, rgba(0, 212, 255, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        #sidebar {
            position: relative;
            z-index: 2;
            width: 260px;
            min-width: 260px;
            background: var(--surface);
            border-right: 0.5px solid var(--neon-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--neon), transparent);
            opacity: 0.4;
        }

        #sidebar-header {
            padding: 24px 20px 20px;
            border-bottom: 0.5px solid rgba(0, 212, 255, 0.08);
        }

        #brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        #brand-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--neon-dim);
            border: 0.5px solid var(--neon-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 12px var(--neon-glow);
        }

        #brand-icon svg {
            width: 18px;
            height: 18px;
            fill: var(--neon);
        }

        #brand-name {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        #new-chat-btn {
            width: 100%;
            padding: 10px 14px;
            background: var(--neon-dim);
            border: 0.5px solid var(--neon-border);
            border-radius: var(--radius-sm);
            color: var(--neon);
            font-size: 13px;
            font-family: var(--font);
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.1);
        }

        #new-chat-btn:hover {
            background: rgba(0, 212, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.25);
            border-color: rgba(0, 212, 255, 0.4);
        }

        #new-chat-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--neon);
        }

        #sidebar-section {
            padding: 16px 20px 8px;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        #chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 12px;
        }

        #chat-list::-webkit-scrollbar {
            width: 3px;
        }

        #chat-list::-webkit-scrollbar-thumb {
            background: var(--neon-border);
            border-radius: 2px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 3px;
            transition: background 0.15s;
            font-size: 12px;
            color: var(--text-muted);
            position: relative;
        }

        .chat-item:hover {
            background: var(--neon-dim);
            color: var(--text);
        }

        .chat-item.active {
            background: var(--neon-dim);
            color: var(--neon);
            border: 0.5px solid var(--neon-border);
        }

        .chat-item svg {
            width: 13px;
            height: 13px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .chat-item-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .chat-item-del {
            display: none;
            width: 16px;
            height: 16px;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 11px;
            flex-shrink: 0;
        }

        .chat-item:hover .chat-item-del {
            display: flex;
        }

        .chat-item-del:hover {
            color: var(--error);
        }

        #no-sessions {
            text-align: center;
            font-size: 12px;
            color: var(--text-dim);
            padding: 24px 12px;
            line-height: 1.8;
        }

        #sidebar-footer {
            padding: 14px 20px;
            border-top: 0.5px solid rgba(0, 212, 255, 0.08);
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        #topbar {
            padding: 16px 24px;
            border-bottom: 0.5px solid rgba(0, 212, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(6, 6, 16, 0.8);
            backdrop-filter: blur(10px);
        }

        #topbar-title {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            flex: 1;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar {
            width: 4px;
        }

        #messages::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.15);
            border-radius: 2px;
        }

        .sys-msg {
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.05em;
            padding: 4px 0;
        }

        .msg-row {
            display: flex;
            gap: 12px;
            animation: fadeUp 0.25s ease;
            max-width: 800px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-row.user {
            flex-direction: row-reverse;
            align-self: flex-end;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            font-family: var(--font-display);
        }

        .avatar.bot {
            background: var(--neon-dim);
            border: 0.5px solid var(--neon-border);
            color: var(--neon);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .avatar.user {
            background: var(--surface3);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
        }

        .msg-body {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-width: calc(100% - 48px);
        }

        .msg-row.user .msg-body {
            align-items: flex-end;
        }

        .bubble {
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .bubble.bot {
            background: var(--surface2);
            border: 0.5px solid rgba(0, 212, 255, 0.1);
            border-radius: 4px 14px 14px 14px;
            color: var(--text);
        }

        .bubble.user {
            background: linear-gradient(135deg, #0a1628, #0d1f3c);
            border: 0.5px solid rgba(0, 136, 255, 0.3);
            border-radius: 14px 4px 14px 14px;
            color: #90caf9;
            box-shadow: 0 0 15px rgba(0, 136, 255, 0.1);
        }

        .bubble.error {
            background: rgba(255, 77, 109, 0.08);
            border: 0.5px solid rgba(255, 77, 109, 0.2);
            border-radius: var(--radius-sm);
            color: var(--error);
            font-size: 12px;
            font-family: monospace;
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-dim);
            padding: 0 2px;
        }

        #typing {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 0 24px 8px;
        }

        .typing-av {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--neon-dim);
            border: 0.5px solid var(--neon-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--neon);
        }

        .typing-bubble {
            background: var(--surface2);
            border: 0.5px solid rgba(0, 212, 255, 0.1);
            border-radius: 4px 14px 14px 14px;
            padding: 12px 16px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .tdot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--neon);
            opacity: 0.5;
            animation: tdot 1.3s infinite;
            box-shadow: 0 0 4px var(--neon);
        }

        .tdot:nth-child(2) {
            animation-delay: 0.15s;
        }

        .tdot:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes tdot {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }

            30% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        #input-area {
            padding: 16px 24px 20px;
            border-top: 0.5px solid rgba(0, 212, 255, 0.08);
            background: rgba(6, 6, 16, 0.9);
            backdrop-filter: blur(10px);
        }

        #file-preview {
            display: none;
            font-size: 11px;
            color: var(--neon);
            font-family: monospace;
            margin-bottom: 8px;
            padding: 6px 12px;
            background: var(--neon-dim);
            border: 0.5px solid var(--neon-border);
            border-radius: 8px;
            align-items: center;
            gap: 8px;
        }

        #file-preview-close {
            cursor: pointer;
            color: var(--text-muted);
            margin-left: auto;
        }

        #file-preview-close:hover {
            color: var(--error);
        }

        #input-box {
            background: var(--surface2);
            border: 0.5px solid var(--neon-border);
            border-radius: 14px;
            padding: 4px 4px 4px 16px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.05);
        }

        #input-box:focus-within {
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.15);
        }

        #input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 14px;
            font-family: var(--font);
            resize: none;
            min-height: 40px;
            max-height: 120px;
            line-height: 1.5;
            padding: 10px 0;
        }

        #input::placeholder {
            color: var(--text-dim);
        }

        #input-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 6px;
        }

        #upload-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            border: 0.5px solid rgba(0, 212, 255, 0.15);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        #upload-btn:hover {
            border-color: var(--neon);
            color: var(--neon);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.2);
        }

        #send {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--neon2), var(--neon));
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        #send:hover {
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
            transform: scale(1.05);
        }

        #send:active {
            transform: scale(0.97);
        }

        #send:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #send svg {
            width: 15px;
            height: 15px;
            fill: #000;
        }

        #input-hint {
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <div id="sidebar-header">
            <div id="brand">
                <div id="brand-icon">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" />
                    </svg>
                </div>
                <div id="brand-name">Haider AI</div>
            </div>
            <button id="new-chat-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
                New conversation
            </button>
        </div>
        <div id="sidebar-section">Recent Chats</div>
        <div id="chat-list">
            <div id="no-sessions">No conversations yet.<br />Start chatting!</div>
        </div>
        <div id="sidebar-footer">Haider AI · All conversations saved</div>
    </div>

    <div id="main">
        <div id="topbar">
            <div id="topbar-title">Haider Assistant</div>
        </div>
        <div id="messages">
            <div class="sys-msg">— new session started —</div>
            <div class="msg-row bot">
                <div class="avatar bot">AI</div>
                <div class="msg-body">
                    <div class="bubble bot">Hello! I am Haider Assistant. Ask me anything or upload a file (PDF, TXT,
                        DOCX).</div>
                    <span class="msg-time" id="init-time"></span>
                </div>
            </div>
        </div>
        <div id="typing">
            <div class="typing-av">AI</div>
            <div class="typing-bubble">
                <div class="tdot"></div>
                <div class="tdot"></div>
                <div class="tdot"></div>
            </div>
        </div>
        <div id="input-area">
            <div id="file-preview">
                <span id="file-preview-name"></span>
                <span id="file-preview-close">✕</span>
            </div>
            <div id="input-box">
                <textarea id="input" placeholder="Message Haider AI..." rows="1"></textarea>
                <div id="input-actions">
                    <label id="upload-btn" title="Upload PDF, TXT, DOCX">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                            <path
                                d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 7V3.5L18.5 9H13zm-2 8v-4H9l3-4 3 4h-2v4h-2z" />
                        </svg>
                        <input type="file" id="file-input" accept=".pdf,.txt,.docx" style="display:none" />
                    </label>
                    <button id="send">
                        <svg viewBox="0 0 24 24">
                            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
                        </svg>
                    </button>
                </div>
            </div>
            <div id="input-hint">Enter to send · Shift+Enter for new line</div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000';
        let SESSION = 'session_' + Date.now();
        let sessionTitle = 'New conversation';

        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const typingEl = document.getElementById('typing');
        const fileInput = document.getElementById('file-input');
        const filePreview = document.getElementById('file-preview');
        const filePreviewName = document.getElementById('file-preview-name');
        const chatList = document.getElementById('chat-list');
        const topbarTitle = document.getElementById('topbar-title');

        document.getElementById('init-time').textContent = now();
        loadSessions();

        function now() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function addMsg(role, text) {
            const row = document.createElement('div');
            row.className = 'msg-row ' + (role === 'user' ? 'user' : 'bot');
            const av = document.createElement('div');
            av.className = 'avatar ' + (role === 'user' ? 'user' : 'bot');
            av.textContent = role === 'user' ? 'You' : 'AI';
            const body = document.createElement('div');
            body.className = 'msg-body';
            const bubble = document.createElement('div');
            bubble.className = 'bubble ' + (role === 'error' ? 'error' : role);
            bubble.textContent = text;
            const ts = document.createElement('span');
            ts.className = 'msg-time';
            ts.textContent = now();
            body.appendChild(bubble);
            body.appendChild(ts);
            row.appendChild(av);
            row.appendChild(body);
            messagesEl.appendChild(row);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return bubble;
        }

        function addSys(text) {
            const d = document.createElement('div');
            d.className = 'sys-msg';
            d.textContent = '— ' + text + ' —';
            messagesEl.appendChild(d);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function loadSessions() {
            try {
                const res = await fetch(`${API}/sessions`);
                const data = await res.json();
                const sessions = data.sessions || [];
                chatList.innerHTML = '';
                if (sessions.length === 0) {
                    chatList.innerHTML = '<div id="no-sessions">No conversations yet.<br/>Start chatting!</div>';
                    return;
                }
                // Backend already returns newest-first; do NOT reverse again
                sessions.forEach(s => chatList.appendChild(buildSessionItem(s)));
            } catch (e) { console.log('Sessions load failed:', e); }
        }

        function buildSessionItem(s) {
            const item = document.createElement('div');
            item.className = 'chat-item' + (s.session_id === SESSION ? ' active' : '');
            item.dataset.id = s.session_id;
            item.innerHTML = `
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <span class="chat-item-title">${escHtml(s.title)}</span>
    <span class="chat-item-del" title="Delete">✕</span>
  `;
            item.addEventListener('click', (e) => {
                if (e.target.classList.contains('chat-item-del')) return;
                switchSession(s.session_id, s.title);
            });
            item.querySelector('.chat-item-del').addEventListener('click', async (e) => {
                e.stopPropagation();
                await fetch(`${API}/history/${s.session_id}`, { method: 'DELETE' }).catch(() => { });
                item.remove();
                if (chatList.children.length === 0) {
                    chatList.innerHTML = '<div id="no-sessions">No conversations yet.<br/>Start chatting!</div>';
                }
                if (SESSION === s.session_id) startFreshSession();
            });
            return item;
        }

        function escHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        async function switchSession(sessionId, title) {
            SESSION = sessionId;
            sessionTitle = title;
            topbarTitle.textContent = title || 'Haider Assistant';
            messagesEl.innerHTML = '';
            filePreview.style.display = 'none';
            document.querySelectorAll('.chat-item').forEach(el => el.classList.toggle('active', el.dataset.id === sessionId));
            try {
                const res = await fetch(`${API}/history/${sessionId}`);
                const data = await res.json();
                const msgs = data.messages || [];
                addSys('conversation loaded');
                msgs.forEach(msg => {
                    if (msg.content.length > 500 && msg.role === 'user') return;
                    addMsg(msg.role === 'user' ? 'user' : 'bot', msg.content);
                });
                if (msgs.length === 0) addMsg('bot', 'Hello! I am Haider Assistant. How can I help you?');
            } catch (e) { addMsg('error', 'Could not load conversation.'); }
        }

        function startFreshSession() {
            SESSION = 'session_' + Date.now();
            sessionTitle = 'New conversation';
            topbarTitle.textContent = 'Haider Assistant';
            messagesEl.innerHTML = '';
            filePreview.style.display = 'none';
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            addSys('new conversation started');
            addMsg('bot', 'Hello! I am Haider Assistant. How can I help you?');
            inputEl.focus();
        }

        document.getElementById('new-chat-btn').addEventListener('click', async () => {
            await loadSessions();
            startFreshSession();
        });

        async function send() {
            const msg = inputEl.value.trim();
            if (!msg || sendBtn.disabled) return;
            const isNewSession = sessionTitle === 'New conversation';
            if (isNewSession) {
                sessionTitle = msg.substring(0, 40) + (msg.length > 40 ? '...' : '');
                topbarTitle.textContent = sessionTitle;
                // Instantly add to sidebar without waiting for server round-trip
                const noSess = document.getElementById('no-sessions');
                if (noSess) noSess.remove();
                const newItem = buildSessionItem({ session_id: SESSION, title: sessionTitle, count: 1 });
                chatList.insertBefore(newItem, chatList.firstChild);
                document.querySelectorAll('.chat-item').forEach(el =>
                    el.classList.toggle('active', el.dataset.id === SESSION));
            }
            inputEl.value = '';
            autoResize();
            sendBtn.disabled = true;
            addMsg('user', msg);
            typingEl.style.display = 'flex';
            messagesEl.scrollTop = messagesEl.scrollHeight;
            try {
                const res = await fetch(`${API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: SESSION, message: msg })
                });
                typingEl.style.display = 'none';
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || `HTTP ${res.status}`);
                }
                const data = await res.json();
                addMsg('bot', data.reply);
                // Refresh sidebar to sync accurate titles/counts from server
                loadSessions();
            } catch (e) {
                typingEl.style.display = 'none';
                addMsg('error', 'Error: ' + e.message);
            }
            sendBtn.disabled = false;
            inputEl.focus();
        }

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            filePreview.style.display = 'flex';
            filePreviewName.textContent = `Uploading ${file.name}...`;
            sendBtn.disabled = true;
            const formData = new FormData();
            formData.append('session_id', SESSION);
            formData.append('file', file);
            try {
                const res = await fetch(`${API}/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Upload failed');
                filePreviewName.textContent = `📄 ${file.name} (${data.characters.toLocaleString()} chars)`;
                addSys(`file uploaded: ${file.name}`);
                addMsg('bot', `I've read "${file.name}" (${data.characters.toLocaleString()} characters). Ask me anything about it!`);
                loadSessions();
            } catch (e) {
                filePreview.style.display = 'none';
                addMsg('error', 'Upload failed: ' + e.message);
            }
            sendBtn.disabled = false;
            e.target.value = '';
            inputEl.focus();
        });

        document.getElementById('file-preview-close').addEventListener('click', () => {
            filePreview.style.display = 'none';
            fileInput.value = '';
        });

        sendBtn.addEventListener('click', send);
        inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
        inputEl.addEventListener('input', autoResize);

        function autoResize() {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
        }
    </script>
</body>

</html>
